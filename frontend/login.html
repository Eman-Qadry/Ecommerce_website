<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BookStore</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>📚 BookStore</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="products.html" class="nav-link">Products</a>
                <a href="cart.html" class="nav-link" id="cartLink">Cart <span id="cartCount">0</span></a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="auth-form">
            <h2>Login</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-large">Login</button>
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </form>
            <div id="message"></div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 BookStore. All rights reserved.</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            fetch(`${API_URL}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('message').innerHTML = `<p class="error">${data.error}</p>`;
                } else {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('userRole', data.role);
                    alert('Login successful!');
                    window.location.href = 'index.html';
                }
            })
            .catch(err => {
                console.error('Error:', err);
                document.getElementById('message').innerHTML = '<p class="error">Login failed</p>';
            });
        }
    </script>
</body>
</html>
