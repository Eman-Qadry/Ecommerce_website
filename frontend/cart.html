<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - BookStore</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>📚 BookStore</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="products.html" class="nav-link">Products</a>
                <a href="cart.html" class="nav-link" id="cartLink">
                    Cart <span id="cartCount">0</span>
                </a>

                <a href="orders.html" class="nav-link" id="ordersLink" style="display: none;">
                    Orders
                </a>

                <div id="authButtons">
                    <a href="login.html" class="nav-link">Login</a>
                    <a href="register.html" class="btn btn-primary btn-small">Register</a>
                </div>

                <div id="userMenu" style="display: none;">
                    <a href="profile.html" class="profile-nav-link">
                        <img id="navProfileImage" src="" alt="Profile" class="nav-profile-pic">
                        <span id="navProfileIcon" class="nav-profile-icon">👤</span>
                    </a>

                    <button id="adminBtn"
                        class="btn btn-small"
                        style="display: none; background-color: #3498db; color: white; border: none;">
                        Admin
                    </button>

                    <button onclick="logout()"
                        class="btn btn-primary btn-small"
                        style="margin-left: auto;">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>
<div class="page-content">
    <div class="container">
        <h2>Shopping Cart</h2>

        <div class="cart-page">
            <div class="cart-items">
                <div id="cartContainer">
                    <!-- Cart items -->
                </div>
            </div>

            <div class="cart-summary">
                <h3>Order Summary</h3>

                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">$0.00</span>
                </div>

                <div class="summary-row">
                    <span>Shipping:</span>
                    <span>$5.00</span>
                </div>

                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="total">$5.00</span>
                </div>

                <button onclick="proceedToCheckout()"
                    class="btn btn-primary btn-large">
                    Proceed to Checkout
                </button>

                <a href="products.html"
                    class="btn btn-secondary btn-large">
                    Continue Shopping
                </a>
            </div>
        </div>

        <!-- Checkout Modal -->
        <div id="checkoutModal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="close" onclick="closeCheckoutModal()">&times;</span>

                <h2>Delivery Information</h2>

                <form id="checkoutForm" onsubmit="submitCheckout(event)">

                    <div class="form-group">
                        <label for="fullName">Full Name *</label>
                        <input type="text" id="fullName" name="fullName" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>

                    <div class="form-group">
                        <label for="address">Street Address *</label>
                        <input type="text" id="address" name="address" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="city">City *</label>
                            <input type="text" id="city" name="city" required>
                        </div>

                        <div class="form-group">
                            <label for="postalCode">Postal Code *</label>
                            <input type="text" id="postalCode" name="postalCode" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="country">Country *</label>
                        <input type="text" id="country" name="country" required>
                    </div>

                    <div class="form-group">
                        <label for="notes">Delivery Notes (Optional)</label>
                        <textarea id="notes" name="notes" rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <button type="submit" class="btn btn-primary btn-large">
                            Place Order
                        </button>

                        <button type="button"
                            class="btn btn-secondary"
                            onclick="closeCheckoutModal()">
                            Cancel
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

    <footer class="footer">
        <p>&copy; 2024 BookStore. All rights reserved.</p>
    </footer>

    <script src="js/app.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadCart();
        });

        // LOAD CART
        function loadCart() {
            const token = localStorage.getItem('token');

            if (!token) {
                document.getElementById('cartContainer').innerHTML =
                    '<p>Please login to view your cart</p>';
                return;
            }

            fetch(`${API_URL}/api/cart`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(res => res.json())
            .then(items => {

                const container = document.getElementById('cartContainer');

                if (!items || items.length === 0) {

                    container.innerHTML = '<p>Your cart is empty</p>';

                    document.getElementById('subtotal').textContent = '$0.00';
                    document.getElementById('total').textContent = '$5.00';

                    return;
                }

                let subtotal = 0;

                container.innerHTML = items.map(item => {

                    const itemTotal = item.price * item.quantity;

                    subtotal += itemTotal;

                    return `
                        <div class="cart-item">

                            <img src="${item.image_url}" alt="${item.title}">

                            <div class="cart-item-info">
                                <h4>${item.title}</h4>
                                <p>${item.author}</p>
                                <p class="price">$${item.price}</p>
                            </div>

                            <div class="cart-item-controls">

                                <input
                                    type="number"
                                    value="${item.quantity}"
                                    min="1"
                                    onchange="updateQuantity(${item.cart_id}, this.value)"
                                    class="quantity-input"
                                >

                                <p>$${itemTotal.toFixed(2)}</p>

                                <button
                                    onclick="removeFromCart(${item.cart_id})"
                                    class="btn btn-danger">
                                    Remove
                                </button>

                            </div>

                        </div>
                    `;
                }).join('');

                document.getElementById('subtotal').textContent =
                    `$${subtotal.toFixed(2)}`;

                document.getElementById('total').textContent =
                    `$${(subtotal + 5).toFixed(2)}`;
            })
            .catch(err => {
                console.error('Error loading cart:', err);
            });
        }

        // UPDATE QUANTITY
        function updateQuantity(cartId, quantity) {

            const token = localStorage.getItem('token');

            fetch(`${API_URL}/api/cart/${cartId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    quantity: parseInt(quantity)
                })
            })
            .then(() => {
                loadCart();
                updateCartCount();
            })
            .catch(err => {
                console.error('Error updating quantity:', err);
                alert('Error updating quantity');
            });
        }

        // REMOVE ITEM
        function removeFromCart(cartId) {

            const token = localStorage.getItem('token');

            fetch(`${API_URL}/api/cart/${cartId}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(() => {
                loadCart();
                updateCartCount();
            })
            .catch(err => {
                console.error('Error removing item:', err);
                alert('Error removing item');
            });
        }

        // EMPTY CART AFTER ORDER
        async function clearCart() {

            const token = localStorage.getItem('token');

            try {

                // get all cart items
                const res = await fetch(`${API_URL}/api/cart`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const items = await res.json();

                // delete every item
                await Promise.all(
                    items.map(item =>
                        fetch(`${API_URL}/api/cart/${item.cart_id}`, {
                            method: 'DELETE',
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        })
                    )
                );

            } catch (err) {
                console.error('Error clearing cart:', err);
            }
        }

        // OPEN CHECKOUT
        function proceedToCheckout() {

            const token = localStorage.getItem('token');

            if (!token) {
                alert('Please login to checkout');
                window.location.href = 'login.html';
                return;
            }

            fetch(`${API_URL}/api/cart`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(res => res.json())
            .then(items => {

                if (items.length === 0) {
                    alert('Your cart is empty');
                    return;
                }

                document.getElementById('checkoutModal').style.display = 'block';

                document.body.style.overflow = 'hidden';
            })
            .catch(err => {
                console.error('Error checking cart:', err);
                alert('Error checking cart');
            });
        }

        // CLOSE MODAL
        function closeCheckoutModal() {

            document.getElementById('checkoutModal').style.display = 'none';

            document.body.style.overflow = 'auto';
        }

        // SUBMIT ORDER
        async function submitCheckout(event) {

            event.preventDefault();

            const token = localStorage.getItem('token');

            if (!token) {
                alert('Please login to checkout');
                window.location.href = 'login.html';
                return;
            }

            const formData = {
                fullName: document.getElementById('fullName').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                postalCode: document.getElementById('postalCode').value,
                country: document.getElementById('country').value,
                notes: document.getElementById('notes').value
            };

            try {

                const response = await fetch(`${API_URL}/api/orders`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.error) {
                    alert(data.error);
                    return;
                }

                // CLEAR CART AFTER ORDER
                await clearCart();

                alert('Order placed successfully!');

                document.getElementById('checkoutForm').reset();

                closeCheckoutModal();

                loadCart();

                updateCartCount();

                window.location.href = 'orders.html';

            } catch (err) {

                console.error('Error placing order:', err);

                alert('Error placing order');
            }
        }

        // CLOSE MODAL ON OUTSIDE CLICK
        window.onclick = function(event) {

            const modal = document.getElementById('checkoutModal');

            if (event.target == modal) {
                closeCheckoutModal();
            }
        }

        function checkout() {
            proceedToCheckout();
        }
    </script>
</body>
</html>
