<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - BookStore</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>📚 BookStore Admin</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Store</a>
                <a href="admin.html" class="nav-link">Manage Products</a>
                <button onclick="logout()" class="btn btn-small">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="admin-panel">
            <h2>Manage Inventory</h2>
            
            <div class="admin-section">
                <h3>Add New Book</h3>
                <form onsubmit="handleAddProduct(event)">
                    <div class="form-group">
                        <label>Title:</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-group">
                        <label>Author:</label>
                        <input type="text" id="author" required>
                    </div>
                    <div class="form-group">
                        <label>Price:</label>
                        <input type="number" id="price" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Stock:</label>
                        <input type="number" id="stock" required>
                    </div>
                    <div class="form-group">
                        <label>Category:</label>
                        <input type="text" id="category" required>
                    </div>
                    <div class="form-group">
                        <label>Description:</label>
                        <textarea id="description"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Image URL:</label>
                        <input type="text" id="image_url" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Product</button>
                </form>
            </div>

            <div class="admin-section">
                <h3>Current Products</h3>
                <table class="products-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productsTable">
                        <!-- Products will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 BookStore. All rights reserved.</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('userRole');
            const token = localStorage.getItem('token');
            
            if (!token || role !== 'admin') {
                alert('Access denied. Admin only.');
                window.location.href = 'index.html';
                return;
            }

            loadAdminProducts();
        });

        function loadAdminProducts() {
            const token = localStorage.getItem('token');
            fetch('http://localhost:5000/api/admin/products', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(products => {
                const tbody = document.getElementById('productsTable');
                tbody.innerHTML = products.map(product => `
                    <tr>
                        <td>${product.id}</td>
                        <td>${product.title}</td>
                        <td>${product.author}</td>
                        <td>$${product.price}</td>
                        <td>${product.stock}</td>
                        <td>
                            <button onclick="editProduct(${product.id})" class="btn btn-small">Edit</button>
                            <button onclick="deleteProduct(${product.id})" class="btn btn-danger btn-small">Delete</button>
                        </td>
                    </tr>
                `).join('');
            });
        }

        function handleAddProduct(event) {
            event.preventDefault();
            const token = localStorage.getItem('token');
            
            const productData = {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                price: parseFloat(document.getElementById('price').value),
                stock: parseInt(document.getElementById('stock').value),
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                image_url: document.getElementById('image_url').value
            };

            fetch('http://localhost:5000/api/admin/products', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(productData)
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                } else {
                    alert('Product added successfully!');
                    event.target.reset();
                    loadAdminProducts();
                }
            })
            .catch(err => {
                console.error('Error:', err);
                alert('Error adding product');
            });
        }

        function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;

            const token = localStorage.getItem('token');
            fetch(`http://localhost:5000/api/admin/products/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(data => {
                alert('Product deleted');
                loadAdminProducts();
            })
            .catch(err => {
                console.error('Error:', err);
                alert('Error deleting product');
            });
        }

        function editProduct(id) {
            alert('Edit functionality can be added - currently delete and re-add to modify');
        }
    </script>
</body>
</html>
